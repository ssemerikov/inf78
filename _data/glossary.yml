- term: Апаратне забезпечення
  definition: Сукупність усіх фізичних компонентів цифрового пристрою (процесор, пам'ять, дисплей, клавіатура тощо).
  class: [7, 8]

- term: Апаратна проблема
  definition: Несправність, спричинена пошкодженням або неправильною роботою фізичних компонентів цифрового пристрою.
  class: [7]

- term: Діагностика
  definition: Процес виявлення причин несправності в роботі цифрового пристрою за допомогою стандартних засобів та методів.
  class: [7]

- term: Кеш-пам'ять
  definition: Тимчасове сховище даних, яке прискорює доступ до часто використовуваної інформації; періодично потребує очищення.
  class: [7]

- term: Комп'ютерна система
  definition: Сукупність апаратних і програмних компонентів, що працюють разом для виконання інформаційних задач.
  class: [7]

- term: Мережеве обладнання
  definition: Пристрої, які забезпечують з'єднання комп'ютерів у мережу (маршрутизатор, комутатор, модем).
  class: [7]

- term: Периферійний пристрій
  definition: Зовнішній пристрій, підключений до комп'ютера для розширення його можливостей (принтер, сканер, миша тощо).
  class: [7, 8]

- term: Програмне забезпечення
  definition: Сукупність програм, які керують роботою цифрового пристрою та виконують задачі користувача.
  class: [7]

- term: Програмна проблема
  definition: Несправність, спричинена помилками в програмному забезпеченні, конфліктами програм або неправильними налаштуваннями.
  class: [7]

- term: Точка відновлення системи
  definition: Збережений стан операційної системи, до якого можна повернутися за виникнення серйозних несправностей.
  class: [7]

- term: Цифровий пристрій
  definition: Електронний пристрій, який приймає, опрацьовує, зберігає та передає дані у цифровій формі.
  class: [7]

- term: Цифрові технології
  definition: Технології, що використовують цифрові пристрої та програмне забезпечення для створення, опрацювання й передавання інформації.
  class: [7]

- term: Процесор
  definition: "Основний обчислювальний пристрій комп'ютера, що виконує обробку даних; має характеристики: тактова частота, кількість ядер, розрядність."
  class: [8]

- term: Оперативна пам'ять (RAM)
  definition: Пам'ять для тимчасового зберігання даних під час роботи комп'ютера; швидка, але енергозалежна.
  class: [8]

- term: Постійна пам'ять (ROM)
  definition: Пам'ять для тривалого зберігання даних; енергонезалежна (HDD, SSD, флеш-накопичувачі).
  class: [8]

- term: Пристрій введення
  definition: Обладнання для подання даних у комп'ютер (клавіатура, миша, сканер, мікрофон, веб-камера тощо).
  class: [8]

- term: Пристрій виведення
  definition: Обладнання для отримання результатів обробки від комп'ютера (монітор, принтер, колонки, проєктор тощо).
  class: [8]

- term: Материнська плата
  definition: Основна друкована плата комп'ютера, що поєднує всі його складові.
  class: [8]

- term: Збій
  definition: Порушення нормальної роботи апаратного чи програмного забезпечення комп'ютера.
  class: [8]

- term: Смарт-технології
  definition: Технології, що використовують вбудовані мікропроцесори та підключення до мережі для інтелектуального функціонування пристроїв.
  class: [8]

- term: Інтернет речей (IoT)
  definition: Мережа фізичних пристроїв, оснащених датчиками, програмним забезпеченням та засобами зв'язку для обміну даними.
  class: [8]

- term: Штучний інтелект
  definition: "Технології та системи, що імітують інтелектуальну діяльність людини: навчання, розпізнавання, прийняття рішень."
  class: [8]